<script>
/* ============================================================
   PDF GENERATION
   ============================================================ */
function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function slugify(s) {
  return s.toLowerCase()
    .replace(/[ăâ]/g, 'a').replace(/î/g, 'i').replace(/[șş]/g, 's').replace(/[țţ]/g, 't')
    .replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

function openNameModal() {
  const m = document.getElementById('name-modal');
  m.classList.add('visible');
  setTimeout(() => {
    const input = document.getElementById('pdf-name');
    if (input) input.focus();
  }, 100);
}

function closeNameModal() {
  document.getElementById('name-modal').classList.remove('visible');
}

document.getElementById('modal-close').addEventListener('click', closeNameModal);
document.getElementById('pdf-skip').addEventListener('click', () => {
  closeNameModal();
  generatePDF('');
});
document.getElementById('pdf-confirm').addEventListener('click', () => {
  const name = document.getElementById('pdf-name').value.trim();
  closeNameModal();
  generatePDF(name);
});

document.getElementById('name-modal').addEventListener('click', (e) => {
  if (e.target.id === 'name-modal') closeNameModal();
});

document.getElementById('pdf-name').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    e.preventDefault();
    document.getElementById('pdf-confirm').click();
  }
});

async function generatePDF(userName) {
  const btn = document.querySelector('.btn-download');
  const originalBtnHTML = btn ? btn.innerHTML : '';
  if (btn) {
    btn.innerHTML = '<span>Se generează PDF-ul...</span>';
    btn.style.pointerEvents = 'none';
  }

  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }

    const stage = document.getElementById('pdf-stage');
    stage.innerHTML = buildPDFPages(userName);

    await new Promise(r => setTimeout(r, 200));
    await new Promise(r => requestAnimationFrame(r));

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({
      unit: 'px',
      format: 'a4',
      orientation: 'portrait',
      hotfixes: ['px_scaling']
    });

    const pages = stage.querySelectorAll('.pdf-page');
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();

    for (let i = 0; i < pages.length; i++) {
      const canvas = await html2canvas(pages[i], {
        scale: 2,
        backgroundColor: '#FDFCF8',
        useCORS: true,
        logging: false,
        windowWidth: 794,
        windowHeight: 1123
      });
      const imgData = canvas.toDataURL('image/jpeg', 0.93);
      if (i > 0) pdf.addPage();
      pdf.addImage(imgData, 'JPEG', 0, 0, pageW, pageH, undefined, 'FAST');
    }

    const safeName = userName
      ? '-' + userName.replace(/[^a-zA-ZăâîșțĂÂÎȘȚ0-9 ]/g, '').replace(/\s+/g, '-').substring(0, 40)
      : '';
    const filename = `Raport-Orientare-FSGC${safeName}.pdf`;
    pdf.save(filename);

    stage.innerHTML = '';
  } catch (err) {
    console.error('PDF generation error:', err);
    alert('A apărut o eroare la generarea PDF-ului. Te rugăm încearcă din nou.');
  } finally {
    if (btn) {
      btn.innerHTML = originalBtnHTML;
      btn.style.pointerEvents = '';
    }
  }
}

function buildPDFPages(userName) {
  const r = state.result;
  const now = new Date();
  const dateStr = now.toLocaleDateString('ro-RO', { day: 'numeric', month: 'long', year: 'numeric' });
  const timeStr = now.toLocaleTimeString('ro-RO', { hour: '2-digit', minute: '2-digit' });

  const mainProg = PROGRAMS[r.top1.code];
  const secondaryProg = r.isMixed ? PROGRAMS[r.top2.code] : null;

  const confidenceCopy = {
    strong: { level: 'Fermă', desc: 'Un singur program iese foarte clar în față. Scorul ridicat și distanța mare de locul 2 sugerează o direcție limpede.' },
    good:   { level: 'Bună', desc: 'Un program se distinge de celelalte. Profilul tău indică o direcție clară, cu câteva zone colaterale relevante.' },
    mixed:  { level: 'Mixtă', desc: 'Primele două programe sunt foarte apropiate. Profilul tău are o natură duală - ambele direcții ți se potrivesc în grade similare.' },
    exploration: { level: 'Exploratorie', desc: 'Niciun program nu domină clar. Te afli într-o fază de explorare - merită să investighezi în detaliu primele două sugestii.' },
    caution: { level: 'Orientativă', desc: 'Ai ratat verificările de atenție, așa că rezultatul este orientativ. Ia în considerare reluarea testului într-un moment mai liniștit.' }
  };
  const conf = confidenceCopy[r.confidence];

  let coverResult, coverLede;
  if (r.isMixed) {
    coverResult = `Ți se potrivesc <em>în egală măsură</em>`;
    coverLede = `Primul program descrie ce te atrage cel mai mult în mod spontan, iar al doilea program descrie mediul în care ai putea performa foarte bine dacă îți dorești o combinație între cele două direcții.`;
  } else {
    coverResult = `Programul cel mai <em>compatibil</em>`;
    const desc = mainProg.description.split('.').slice(0, 2).join('.') + '.';
    coverLede = desc;
  }

  const mainResultLine = r.isMixed
    ? `<span class="pdf-cover-result-code">${r.top1.code}</span> ${mainProg.name}<br><br><span class="pdf-cover-result-code">${r.top2.code}</span> ${secondaryProg.name}`
    : `<span class="pdf-cover-result-code">${r.top1.code}</span> ${mainProg.name}`;

  // ===== COVER PAGE =====
  const pageCover = `
    <div class="pdf-page">
      <div class="pdf-cover">
        <div class="pdf-header">
          <div class="pdf-header-left">UVT · FSGC · Orientare Academică</div>
          <div>${dateStr}</div>
        </div>

        <div class="pdf-cover-body">
          <div class="pdf-cover-kicker">Raport personal · Ediția 2026</div>
          <div class="pdf-cover-title">Raport de<br><em>Orientare</em><br>Academică</div>
          <div class="pdf-cover-divider"></div>
          <div class="pdf-cover-verdict">${r.verdict}</div>
          <div class="pdf-cover-result">${coverResult}</div>
          <div style="font-family:'JetBrains Mono', monospace; font-size:11px; letter-spacing:0.08em; color:#1A1A1A; margin-bottom:22px; line-height:1.7;">${mainResultLine}</div>
          <div class="pdf-cover-lede">${coverLede}</div>
        </div>

        <div class="pdf-cover-meta">
          <div>
            <div class="pdf-cover-meta-item-label">Pregătit pentru</div>
            <div class="pdf-cover-meta-item-value">${userName ? escapeHtml(userName) : 'Candidat(ă) FSGC'}</div>
          </div>
          <div>
            <div class="pdf-cover-meta-item-label">Data generării</div>
            <div class="pdf-cover-meta-item-value">${dateStr}</div>
          </div>
          <div>
            <div class="pdf-cover-meta-item-label">Sesiune</div>
            <div class="pdf-cover-meta-item-value">${timeStr}</div>
          </div>
        </div>

        <div class="pdf-footer">
          <div>Pagina 01</div>
          <div>Facultatea de Științe ale Guvernării și Comunicării</div>
        </div>
      </div>
    </div>
  `;

  // ===== PAGE 2: PROFILE ANALYSIS =====
  const chartRows = r.sorted.map((p, i) => `
    <div class="pdf-chart-row ${i === 0 ? 'top' : ''}">
      <div class="pdf-chart-name">${PROGRAMS[p.code].name}</div>
      <div class="pdf-chart-bar-wrap">
        <div class="pdf-chart-bar" style="width:${p.std}%"></div>
      </div>
      <div class="pdf-chart-score">${p.std.toFixed(0)}/100</div>
    </div>
  `).join('');

  const pageProfile = `
    <div class="pdf-page">
      <div class="pdf-header">
        <div class="pdf-header-left">UVT · FSGC · Raport personal</div>
        <div>I - II · Analiza profilului</div>
      </div>

      <div class="pdf-section-head">
        <div class="pdf-section-num">I.</div>
        <div class="pdf-section-title">Profilul tău de compatibilitate</div>
      </div>

      <p class="pdf-body-text">
        Fiecare program a fost evaluat printr-un scor standardizat pe scala 0–100. Scorul
        reflectă cât de bine răspunsurile tale se aliniază cu profilul vocațional al programului
        respectiv, pe baza celor 35 de itemi din test.
      </p>

      <div class="pdf-chart">
        ${chartRows}
      </div>

      <div class="pdf-card">
        <div class="pdf-card-label">Încredere în rezultat · ${conf.level}</div>
        <div class="pdf-card-text">${conf.desc}</div>
        ${r.cautionFlag === 'one_failed' ? `<div class="pdf-card-text" style="margin-top:8px; font-style:italic; color:#8C5F37;">Ai ratat o verificare a atenției - rezultatul este valid, dar ia-l cu o notă de prudență.</div>` : ''}
      </div>

      <div class="pdf-section-head" style="margin-top:26px;">
        <div class="pdf-section-num">II.</div>
        <div class="pdf-section-title">Cele mai compatibile trei direcții</div>
      </div>

      <div class="pdf-top3">
        ${[r.top1, r.top2, r.top3].map((p, i) => {
          const prog = PROGRAMS[p.code];
          return `
            <div class="pdf-top3-card">
              <div class="pdf-top3-rank ${i === 0 ? 'gold' : ''}">${['Locul întâi','Locul al doilea','Locul al treilea'][i]}</div>
              <div class="pdf-top3-name">${prog.name}</div>
              <div class="pdf-top3-score">${p.std.toFixed(0)} / 100 · ${p.code}</div>
              <div class="pdf-top3-desc">${prog.shortDesc}</div>
            </div>
          `;
        }).join('')}
      </div>

      <div class="pdf-footer">
        <div>Pagina 02</div>
        <div>Raport generat local · confidențial</div>
      </div>
    </div>
  `;

  // ===== PAGE 3: MAIN PROGRAM DETAIL =====
  const pageMainDetail = `
    <div class="pdf-page">
      <div class="pdf-header">
        <div class="pdf-header-left">UVT · FSGC · Raport personal</div>
        <div>III · Programul principal</div>
      </div>

      <div class="pdf-section-head">
        <div class="pdf-section-num">III.</div>
        <div class="pdf-section-title">Despre ${mainProg.name}</div>
      </div>

      <div class="pdf-ribbon">${mainProg.code} · Scor ${r.top1.std.toFixed(0)}/100</div>

      <div class="pdf-quote">${mainProg.tagline}</div>

      <p class="pdf-body-text">${mainProg.description}</p>

      <p class="pdf-body-text">${mainProg.programContext}</p>

      <div class="pdf-details-grid">
        <div>
          <div class="pdf-details-label">Discipline-cheie</div>
          <div class="pdf-tag-list">
            ${mainProg.disciplines.map(d => `<span class="pdf-tag">${d}</span>`).join('')}
          </div>
        </div>
        <div>
          <div class="pdf-details-label">Cariere posibile</div>
          <div class="pdf-tag-list">
            ${mainProg.careers.map(c => `<span class="pdf-tag">${c}</span>`).join('')}
          </div>
        </div>
      </div>

      <div class="pdf-footer">
        <div>Pagina 03</div>
        <div>admitere.uvt.ro</div>
      </div>
    </div>
  `;

  // ===== PAGE 4 (optional): SECONDARY PROGRAM =====
  let pageSecondDetail = '';
  if (r.isMixed && secondaryProg) {
    pageSecondDetail = `
      <div class="pdf-page">
        <div class="pdf-header">
          <div class="pdf-header-left">UVT · FSGC · Raport personal</div>
          <div>IV · Program complementar</div>
        </div>

        <div class="pdf-section-head">
          <div class="pdf-section-num">IV.</div>
          <div class="pdf-section-title">Despre ${secondaryProg.name}</div>
        </div>

        <div class="pdf-ribbon">${secondaryProg.code} · Scor ${r.top2.std.toFixed(0)}/100</div>

        <div class="pdf-quote">${secondaryProg.tagline}</div>

        <p class="pdf-body-text">${secondaryProg.description}</p>

        <p class="pdf-body-text">${secondaryProg.programContext}</p>

        <div class="pdf-details-grid">
          <div>
            <div class="pdf-details-label">Discipline-cheie</div>
            <div class="pdf-tag-list">
              ${secondaryProg.disciplines.map(d => `<span class="pdf-tag">${d}</span>`).join('')}
            </div>
          </div>
          <div>
            <div class="pdf-details-label">Cariere posibile</div>
            <div class="pdf-tag-list">
              ${secondaryProg.careers.map(c => `<span class="pdf-tag">${c}</span>`).join('')}
            </div>
          </div>
        </div>

        <div class="pdf-footer">
          <div>Pagina 04</div>
          <div>admitere.uvt.ro</div>
        </div>
      </div>
    `;
  }

  // ===== FINAL PAGE: METHODOLOGY & NEXT STEPS =====
  const lastPageNum = r.isMixed ? '05' : '04';
  const lastSectionNum = r.isMixed ? 'V.' : 'IV.';
  const methodologyPage = `
    <div class="pdf-page">
      <div class="pdf-header">
        <div class="pdf-header-left">UVT · FSGC · Raport personal</div>
        <div>${lastSectionNum} Metodologie &amp; pași următori</div>
      </div>

      <div class="pdf-section-head">
        <div class="pdf-section-num">${lastSectionNum}</div>
        <div class="pdf-section-title">Metodologie și pași următori</div>
      </div>

      <div class="pdf-methodology">
        <h4>Cum a fost calculat rezultatul</h4>
        <p>
          Testul conține <strong>35 de itemi</strong> împărțiți în patru blocuri: 17 afirmații Likert,
          8 alegeri între alternative, 8 scenarii practice și 2 exerciții de ierarhizare. Fiecare
          răspuns contribuie cu puncte la unul sau mai multe dintre cele 8 programe evaluate.
          Scorul brut per program este apoi standardizat pe scala 0–100 pentru comparabilitate.
        </p>
        <p>
          Itemii sunt ancorați în descrierile oficiale ale programelor de licență FSGC - UVT,
          în rezultatele așteptate ale învățării și în ocupațiile indicate pe paginile oficiale
          de admitere ale universității.
        </p>

        <h4>Ce să faci în continuare</h4>
        <ul>
          <li><strong>Vizitează Ziua Porților Deschise</strong> a Facultății de Științe ale Guvernării și Comunicării pentru a vedea direct mediul academic.</li>
          <li><strong>Discută cu studenți actuali</strong> din programul ${mainProg.name} - detaliile despre cum este în realitate un program nu sunt pe hârtie.</li>
          <li><strong>Citește fișa oficială</strong> a programului la admitere.uvt.ro pentru lista completă de discipline și opționale.</li>
          <li><strong>Programează o consiliere vocațională</strong> dacă profilul tău a fost mixt sau exploratoriu - poate ajuta să rafinezi direcția.</li>
          <li><strong>Reia testul</strong> peste câteva săptămâni dacă simți că răspunsurile tale s-au schimbat - orientarea este un proces, nu un moment.</li>
        </ul>

        <h4>Despre validitatea rezultatului</h4>
        <p>
          Acest raport este un <strong>instrument orientativ</strong>, nu un verdict academic sau
          profesional. Un test de 10 minute nu poate înlocui experiența directă, consilierea
          vocațională sau discuțiile cu profesioniști din domeniu. Ia rezultatul ca un punct de
          plecare pentru întrebări mai bune, nu ca un punct final.
        </p>
      </div>

      <div class="pdf-signoff">
        „Orientarea nu este despre a găsi un răspuns perfect, ci despre a învăța să pui întrebările potrivite."
      </div>

      <div class="pdf-footer">
        <div>Pagina ${lastPageNum}</div>
        <div>uvt.ro · admitere.uvt.ro · Generat ${dateStr}</div>
      </div>
    </div>
  `;

  return pageCover + pageProfile + pageMainDetail + pageSecondDetail + methodologyPage;
}
</script>
